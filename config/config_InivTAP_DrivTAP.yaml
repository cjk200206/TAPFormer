# Configuration file for Aedat4 dataset evaluation

# Dataset paths
dataset_dir: "/home/ljx/code/FE-TAP2/data/seq_data"
ckpt_root: "/home/ljx/code/FE-TAP2/checkpoints/kubric_new/fe-tsa-f1-s4-v6-4-fe-basic/model_final.pth"

# Test sequences
eval_datasets_aedat4:
  - "indoor_fruit_410_510"
