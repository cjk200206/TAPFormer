# Configuration file for Aedat4 dataset evaluation

# Dataset paths
dataset_dir: "dataset_dir"
ckpt_root: "tapformer.pth"

# Test sequences
eval_datasets:
  # InivTAP
  - ["ID_Fast_Fruit", "InivTAP"]
  - ["ID_Dark_Fruit", "InivTAP"]
  - ["ID_Fast_Hand", "InivTAP"]
  - ["ID_OverExp_Fruit", "InivTAP"]
  - ["ID_OverExp_Fruit2", "InivTAP"]
  - ["ID_Dynamic_Robot", "InivTAP"]
  - ["OD_Dynamic", "InivTAP"]
  - ["OD_Static", "InivTAP"]
  - ["OD_Basketball", "InivTAP"]
  # DrivTAP
  - ["Day_Tunnel", "DrivTAP"]
  - ["Day_Bridge", "DrivTAP"]
  - ["Day_Fast", "DrivTAP"]
  - ["Night_Road", "DrivTAP"]
  - ["Night_Fast", "DrivTAP"]

# Model configuration (auto-detected from checkpoint path if not specified)
# If checkpoint path contains these strings, the corresponding config will be used
representation: "time_surfaces_v2_5"  # Options: "time_surfaces_v2_5"
stride: 4  # Auto-detected from checkpoint path if contains "-s4-", else 8
corr_levels: 3  # Auto-detected from checkpoint path
backbone: "basic"  # Auto-detected from checkpoint path
window_size: 16
corr_radius: 3
hidden_size: 384
space_depth: 3
time_depth: 3

# Evaluation settings
dt: 0.0100
grid_size: 0
n_iters: 5

# Visualization and output settings
visualization:
  enable: false  # Set to true to enable visualization
  fps: 20  # FPS for visualization videos

output:
  save_results: false  # Set to true to save results
  save_trajectory: false  # Set to true to save trajectory files
  base_dir: "output/eval_aedat4_subseq"  # Base directory for outputs

