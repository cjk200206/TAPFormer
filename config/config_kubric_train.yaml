# Configuration file for Kubric/ETAP training

# Dataset settings
dataset:
  data_root: "data/event_kubric/test"
  representation: "time_surfaces_v2_5"
  seq_len: 24
  traj_per_sample: 128
  height: 384
  width: 512
  sample_vis_1st_frame: false
  choose_long_point: false
  use_augs: false
  if_test: false

# Training settings
train:
  save_dir: "output/train_kubric"
  epochs: 500
  batch_size: 1
  num_workers: 4
  shuffle: true
  pin_memory: true
  drop_last: true
  lr: 0.0005
  weight_decay: 0.0001
  iters: 4
  log_every: 100
  save_every_epochs: 0   # 0 means disable periodic epoch checkpoints
  save_last: true        # always save final.pth after training
  save_best: true        # save best checkpoint during training
  best_metric: "loss"    # loss | coord_loss | visibility_loss | confidence_loss
  best_mode: "min"       # min | max
  best_filename: "best.pth"
  precision: "bf16"   # fp32 | fp16 | bf16
  seed: 0
  pretrained: output/final_0427.pth    # optional: load model weights only (does not restore optimizer/epoch)
  pretrained_strict: false
  resume: null

# Model settings
model:
  name: "tapformer"   # tapformer | tapformer_ablation
  feature_mode: "fusion"       # fusion | image | event (only for tapformer_ablation)
  window_size: 16
  stride: 4
  corr_levels: 3
  corr_radius: 3
  hidden_size: 384
  space_depth: 3
  time_depth: 3

# Loss settings
loss:
  coord_weight: 0.1
  visibility_weight: 1.0
  confidence_weight: 1.0
  iter_gamma: 0.8
  confidence_threshold: 12.0
