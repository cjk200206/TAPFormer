# Configuration file for Kubric/ETAP training with TSANet-style query frontend
dataset:
  data_root: "data/event_kubric/train"
  val_root: "data/event_kubric/val"
  representation: "time_surfaces_v2_5"
  seq_len: 24
  traj_per_sample: 150
  height: 384
  width: 512
  sample_vis_1st_frame: false
  choose_long_point: true
  use_augs: false
  if_test: false

train:
  save_dir: "output/train_kubric_ts_query"
  epochs: 100 # disabled if max_steps is set
  max_steps: 100000
  batch_size: 1
  num_workers: 8
  shuffle: true
  pin_memory: true
  drop_last: true
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  scheduler:
    enabled: true
    type: "onecycle"
  iters: 4
  log_every: 100
  save_every_epochs: 0
  save_last: true
  save_best: true
  best_metric: "val/loss"
  best_mode: "min"
  best_filename: "best.pth"
  precision: "bf16"
  seed: 0
  pretrained: null
  pretrained_strict: false
  resume: null
  ddp_find_unused_parameters: True

model:
  name: "tapformer"
  frontend_type: "ts_query"
  feature_mode: "fusion"
  window_size: 16
  stride: 4
  corr_levels: 3
  corr_radius: 3
  hidden_size: 384
  space_depth: 3
  time_depth: 3

loss:
  coord_weight: 0.05
  invisible_coord_weight: 0.01
  visibility_weight: 1.0
  confidence_weight: 1.0
  iter_gamma: 0.8
  confidence_threshold: 12.0
  add_huber_loss: true
  huber_delta: 6.0
  loss_only_for_visible: true
