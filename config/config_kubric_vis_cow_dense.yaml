# Configuration file for Kubric/ETAP visualization with TAPFormer fusion + CoW-style dense head

ckpt_root: "output/train_kubric_cow_dense/20260606_234701/best.pth"

dataset:
  data_root: "data/event_kubric/test"
  representation: "time_surfaces_v2_5"
  seq_len: 95
  traj_per_sample: 256
  height: 384
  width: 512
  sample_vis_1st_frame: true
  choose_long_point: false
  use_augs: false
  if_test: true

model:
  name: "tapformer_cow_dense"
  backbone: "basic"
  window_size: 8
  stride: 4
  corr_levels: 3
  corr_radius: 3
  hidden_size: 384
  space_depth: 3
  time_depth: 3
  cow_refine_model: "vits"
  cow_refine_patch_size: 4
  cow_refine_blocks: null
  cow_temporal_interleave_stride: 2
  cow_tracking_down_ratio: 2
  cow_limit_flow: false
  cow_max_flow_update_ratio: 0.15
  cow_max_flow_magnitude_ratio: 1.0
  cow_refine_checkpoint: true
  cow_info_update_mode: "iterative"  # direct | iterative
  cow_online_use_window_init: true
  cow_online_use_global_first_anchor: true
  cow_online_use_memory_features: false
  cow_online_num_memory_frames: 8
  cow_window_stride: null  # null -> window_size // 2
  cow_window_num_memory_frames: 8
  cow_frontend_type: "base"  # "base" | "frame_anchor"
  cow_anchor_state_mix: 0.7
  cow_anchor_skip_mix: 0.7

predictor:
  inference_mode: "online"  # online | offline | cowtracker_windowed
  input_mode: "fusion"  # fusion | frame | event
  n_iters: 5
  grid_size: 0
  local_grid_size: 0
  single_point: false
  sift_size: 0
  num_uniformly_sampled_pts: 0
  local_extent: 50
  if_test: true

eval:
  seq_names: []
  start_index: 0
  max_seqs: 5

visualization:
  output_dir: "output/eval_kubric_cow_dense"
  enable: true
  video_model: "events"
  use_clear_video: true
  use_gt_as_prediction: false
  query_mode: "grid"  # gt | grid
  grid_size: 32
  visibility_threshold: 0.8
  fps: 20
  linewidth: 2
  mode: "rainbow"
  tracks_leave_trace: 12
  dense_debug: false
  dense_overlay_alpha: 0.5
  online_dual_merge_export: false
  video_start: 0
  video_length: 0
