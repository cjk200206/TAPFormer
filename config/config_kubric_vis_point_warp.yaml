ckpt_root: "output/train_kubric_point_warp/20260708_160510/best.pth"

dataset:
  data_root: "data/event_kubric/test"
  representation: "time_surfaces_v2_5"
  seq_len: 95
  traj_per_sample: 256
  height: 384
  width: 512
  sample_vis_1st_frame: false
  choose_long_point: false
  use_augs: false
  if_test: true

model:
  name: "tapformer_point_warp"
  backbone: "basic"
  window_size: 8
  stride: 4
  corr_levels: 3
  corr_radius: 3
  hidden_size: 384
  space_depth: 3
  time_depth: 3
  point_state_dim: 128
  point_warp_dim: 256
  point_corr_levels: 3
  point_patch_radius: 2
  point_initializer_stride: 16
  point_initializer_temperature: 20.0
  point_cost_base_stride: 8
  point_cost_levels: 3
  point_cost_radius: 3
  point_cost_dim: 256
  point_initializer_radius: 5
  point_initializer_chunk_size: 64
  point_detach_coords: true
  point_limit_update: true
  point_max_update_ratio: 0.15
  point_max_magnitude_ratio: 1.0
  point_support_mode: "none"
  point_online_init_mode: "initializer"

predictor:
  inference_mode: "online"
  input_mode: "fusion"
  n_iters: 5
  grid_size: 0
  local_grid_size: 0
  single_point: false
  sift_size: 0
  num_uniformly_sampled_pts: 0
  local_extent: 50
  if_test: true

eval:
  seq_names: []
  start_index: 0
  max_seqs: 5

visualization:
  output_dir: "output/eval_kubric_point_warp"
  enable: true
  video_model: "events"
  use_clear_video: true
  use_gt_as_prediction: false
  query_mode: "grid"
  grid_size: 32
  visibility_threshold: 0.8
  fps: 20
  linewidth: 2
  mode: "rainbow"
  tracks_leave_trace: 8
  dense_debug: false
  online_dual_merge_export: false
  video_start: 0
  video_length: 0
