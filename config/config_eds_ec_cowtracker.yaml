# Configuration file for EDS and EC dataset evaluation with external CowTracker RGB model

dataset_dir: "data/TAPFormer_Dataset"

eval_datasets_eds:
  - "peanuts_light_160_386"
  - "rocket_earth_light_338_438"
  - "ziggy_in_the_arena_1350_1650"
  - "peanuts_running_2360_2460"

eval_datasets_ec:
  - "shapes_translation_8_88"
  - "shapes_rotation_165_245"
  - "shapes_6dof_485_565"
  - "boxes_translation_330_410"
  - "boxes_rotation_198_278"

representation: "time_surfaces_v2_5"
eval_resolution: [448, 560]

eval_model:
  backend: "cowtracker"
  external_config: "eval_model_cowtracker.yaml"

eds:
  dt: 0.005
  grid_size: 3
  n_iters: 3

ec:
  dt: 0.010
  grid_size: 5
  n_iters: 6

visualization:
  enable: true
  fps: 50
  fps_ec: 50

output:
  save_results: false
  save_trajectory: false
  base_dir: "output/eval_cowtracker"
  eds_dir: "output/eval_eds_subseq_cowtracker"
  ec_dir: "output/eval_ec_subseq_cowtracker"
