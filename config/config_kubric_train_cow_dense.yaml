# Configuration file for Kubric/ETAP training with TAPFormer fusion + CoW-style dense head

dataset:
  data_root: "data/event_kubric/test"
  representation: "time_surfaces_v2_5"
  seq_len: 24
  traj_per_sample: 128
  height: 384
  width: 512
  sample_vis_1st_frame: true
  choose_long_point: false
  use_augs: false
  if_test: false

train:
  save_dir: "output/train_kubric_cow_dense"
  epochs: 500
  batch_size: 1
  num_workers: 4
  shuffle: true
  pin_memory: true
  drop_last: true
  lr: 0.0005
  weight_decay: 0.0001
  iters: 3
  log_every: 100
  save_every_epochs: 0
  save_last: true
  save_best: true
  best_metric: "loss"
  best_mode: "min"
  best_filename: "best.pth"
  precision: "bf16"
  seed: 0
  pretrained: null
  pretrained_strict: false
  resume: null

model:
  name: "tapformer_cow_dense"
  window_size: 16
  stride: 4
  corr_levels: 3
  corr_radius: 3
  hidden_size: 384
  space_depth: 3
  time_depth: 3
  cow_head_iters: 4
  cow_refine_model: "vits"
  cow_refine_patch_size: 8
  cow_refine_blocks: null
  cow_temporal_interleave_stride: 2

loss:
  coord_weight: 0.1
  visibility_weight: 1.0
  confidence_weight: 1.0
  iter_gamma: 0.8
  confidence_threshold: 12.0
