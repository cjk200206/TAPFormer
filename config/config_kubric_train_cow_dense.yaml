# Configuration file for Kubric/ETAP training with TAPFormer fusion + CoW-style dense head

dataset:
  data_root: "data/event_kubric/train"
  representation: "time_surfaces_v2_5"
  seq_len: 12
  traj_per_sample: 384
  resample_max_tries: 8
  height: 384
  width: 512
  sample_vis_1st_frame: true
  choose_long_point: false
  use_augs: false
  if_test: false
  global_first_train_prob: 0.0

train:
  save_dir: "output/train_kubric_cow_dense"
  epochs: 35
  batch_size: 1
  num_workers: 8
  shuffle: true
  pin_memory: true
  drop_last: true
  lr: 0.0001
  # lr: 0.0002
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  scheduler:
    enabled: true
    type: "cosine"
    warmup_steps: 3000
    min_lr: 1.0e-6
    step_on: "step"
  iters: 5
  log_every: 100
  save_every_epochs: 0
  save_last: true
  save_best: true
  best_metric: "loss"
  best_mode: "min"
  best_filename: "best.pth"
  precision: "bf16"
  seed: 0
  pretrained: null
  pretrained_strict: false
  resume: null

model:
  name: "tapformer_cow_dense"
  window_size: 16
  stride: 4
  corr_levels: 3
  corr_radius: 3
  hidden_size: 384
  space_depth: 3
  time_depth: 3
  cow_refine_model: "vits"
  cow_refine_patch_size: 4
  cow_refine_blocks: null
  cow_temporal_interleave_stride: 2
  cow_tracking_down_ratio: 2
  cow_limit_flow: false
  cow_max_flow_update_ratio: 0.15
  cow_max_flow_magnitude_ratio: 1.0
  cow_refine_checkpoint: true
  cow_info_update_mode: "iterative"  # direct | iterative
  cow_frontend_type: "base"  # "base" | "frame_anchor"
  cow_anchor_state_mix: 0.7
  cow_anchor_skip_mix: 0.7

loss:
  coord_weight: 0.05
  invisible_coord_weight: 0.01 #0.01
  visibility_weight: 1.0
  confidence_weight: 1.0
  iter_gamma: 0.8
  confidence_threshold: 12.0
  add_huber_loss: true
  huber_delta: 6.0
  loss_only_for_visible: true
