# Configuration file for EDS and EC dataset evaluation with TAPFormer Cow Dense

# Dataset paths
dataset_dir: "data/TAPFormer_Dataset"
ckpt_root: "output/train_kubric_cow_dense/20260602_160109/best.pth"

# Test sequences
eval_datasets_eds:
  - "peanuts_light_160_386"
  - "rocket_earth_light_338_438"
  - "ziggy_in_the_arena_1350_1650"
  - "peanuts_running_2360_2460"

eval_datasets_ec:
  - "shapes_translation_8_88"
  - "shapes_rotation_165_245"
  - "shapes_6dof_485_565"
  - "boxes_translation_330_410"
  - "boxes_rotation_198_278"

# Model configuration
model_name: "tapformer_cow_dense"
representation: "time_surfaces_v2_5"
stride: 4
corr_levels: 3
backbone: "basic"
window_size: 12
corr_radius: 3
hidden_size: 384
space_depth: 3
time_depth: 3
input_mode: "fusion"  # fusion | frame | event
cow_refine_model: "vits"
cow_refine_patch_size: 4
cow_refine_blocks: null
cow_temporal_interleave_stride: 2
cow_tracking_down_ratio: 2
cow_limit_flow: false
cow_max_flow_update_ratio: 0.15
cow_max_flow_magnitude_ratio: 1.0
cow_refine_checkpoint: true
cow_info_update_mode: "iterative"
cow_online_use_window_init: false
cow_online_use_global_first_anchor: true
cow_online_use_memory_features: false
cow_online_num_memory_frames: 12
cow_frontend_type: "base"
cow_anchor_state_mix: 0.7
cow_anchor_skip_mix: 0.7

eval_resolution: [448, 560]

eval_model:
  backend: "tapformer_family"

# Evaluation settings
eds:
  dt: 0.005
  grid_size: 3
  n_iters: 3

ec:
  dt: 0.010
  grid_size: 5
  n_iters: 6

# Visualization and output settings
visualization:
  enable: true
  fps: 50
  fps_ec: 50

output:
  save_results: false
  save_trajectory: false
  base_dir: "output/eval_cow_dense"
  eds_dir: "output/eval_eds_subseq_cow_dense"
  ec_dir: "output/eval_ec_subseq_cow_dense"
